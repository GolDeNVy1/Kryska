
services:
  lavalink:
    image: ghcr.io/lavalink-devs/lavalink:4.2.2-alpine
    container_name: lavalink
    restart: unless-stopped
    environment:
      - _JAVA_OPTIONS=-Xmx6G
      - SERVER_PORT=2333
      - LAVALINK_SERVER_PASSWORD=youshallnotpass
    networks:
      - lavalink_network
    volumes:
      - ./application.yml:/opt/Lavalink/application.yml
      - ./plugins/:/opt/Lavalink/plugins/
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='Authorization: youshallnotpass' http://localhost:2333/version || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s


  bot:
    build: ./
    container_name: bot
    restart: unless-stopped
    depends_on:
      lavalink:
        condition: service_healthy
    environment:
      - LAVA_HOST=lavalink
      - LAVA_PORT=2333
    networks:
      - lavalink_network
      - frontend_network

networks:
  lavalink_network:
    name: lavalink_network

  frontend_network:
    driver: bridge
